<!DOCTYPE html>
<html lang="en-AU">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Your say · Offsider</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@600;700;800;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/styles.css">
<style>
  body { background: var(--brand); }
  .fb-wrap { max-width: 560px; margin: 0 auto; padding: 1.4rem 1rem 4rem; }
  .fb-top { display: flex; align-items: center; gap: .5rem; color: #fff; padding: 1rem .2rem 1.6rem; }
  .fb-card { background: var(--surface); border-radius: var(--r-xl); box-shadow: var(--shadow-lg); padding: 1.7rem 1.5rem; }
  .fb-card h1 { font-size: 1.6rem; }
  .q { margin: 1.4rem 0; }
  .q .qlabel { font-family: var(--font-head); font-weight: 700; font-size: 1.02rem; margin-bottom: .2rem; }
  .q .qhelp { font-size: .85rem; color: var(--ink-faint); margin-bottom: .6rem; }
  .scale { display: flex; gap: .5rem; }
  .scale button { flex: 1; padding: .7em 0; border-radius: var(--r); border: 1.5px solid var(--line-strong); background: var(--paper); font-family: var(--font-head); font-weight: 800; font-size: 1.1rem; cursor: pointer; transition: all .12s ease; }
  .scale button.sel { background: var(--brand); color: #fff; border-color: var(--brand); transform: translateY(-2px); }
  .scale-ends { display: flex; justify-content: space-between; font-size: .75rem; color: var(--ink-faint); margin-top: .35rem; }
  .choices { display: grid; gap: .5rem; }
  .choices label { display: flex; align-items: center; gap: .6rem; padding: .75em .9em; border: 1.5px solid var(--line-strong); border-radius: var(--r); cursor: pointer; font-weight: 500; }
  .choices label.sel { border-color: var(--brand); background: var(--brand-50); }
  .choices input { accent-color: var(--brand); width: 18px; height: 18px; }
  .anon-note { background: var(--positive-50); color: var(--positive-700); border-radius: var(--r); padding: .7em 1em; font-size: .88rem; margin-bottom: 1rem; display: flex; gap: .5rem; align-items: center; }
  .fb-done { text-align: center; padding: 2rem 1rem; }
  .fb-done .big { font-size: 3rem; }
  .fb-foot { text-align: center; color: #bcd2e0; font-size: .82rem; margin-top: 1.4rem; }
</style>
</head>
<body>
<div class="fb-wrap">
  <div class="fb-top"><span class="logo-mark"><svg viewBox="0 0 24 24"><path d="M12 2 L16.5 12.5 L12 10.2 L7.5 12.5 Z" fill="#fff"/><path d="M12 22 L7.5 11.5 L12 13.8 L16.5 11.5 Z" fill="#fff" opacity=".4"/></svg></span><strong style="font-family:var(--font-head);font-size:1.15rem">Offsider</strong></div>
  <div id="fb"><div class="fb-card"><div class="loading-full" style="min-height:120px"><div class="spinner"></div></div></div></div>
  <div class="fb-foot">Powered by Offsider · Your feedback helps make this a better place to work.</div>
</div>

<script>
(function () {
  var token = location.pathname.split('/').filter(Boolean).pop();
  var box = document.getElementById('fb');
  var esc = function (s) { return String(s == null ? '' : s).replace(/[&<>"]/g, function (c) { return ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' })[c]; }); };
  var data = null, answers = {};

  fetch('/api/public/feedback/' + token).then(function (r) { return r.json().then(function (j) { return { ok: r.ok, j: j }; }); })
    .then(function (res) {
      if (!res.ok) { box.innerHTML = '<div class="fb-card"><div class="fb-done"><div class="big">🤷</div><h1>' + esc(res.j.error || 'Link not found') + '</h1></div></div>'; return; }
      data = res.j;
      if (data.closed) { box.innerHTML = '<div class="fb-card"><div class="fb-done"><div class="big">✅</div><h1>Thanks!</h1><p class="muted">This feedback form is now closed.</p></div></div>'; return; }
      render();
    });

  function render() {
    var qs = data.questions.map(function (q, i) {
      var inner = '';
      if (q.type === 'scale') {
        var btns = [1, 2, 3, 4, 5].map(function (n) { return '<button type="button" data-q="' + q.id + '" data-v="' + n + '">' + n + '</button>'; }).join('');
        inner = '<div class="scale" data-scale="' + q.id + '">' + btns + '</div><div class="scale-ends"><span>Not great</span><span>Spot on</span></div>';
      } else if (q.type === 'choice') {
        inner = '<div class="choices" data-choice="' + q.id + '">' + (q.options || []).map(function (o) {
          return '<label><input type="radio" name="' + q.id + '" value="' + esc(o) + '"> ' + esc(o) + '</label>';
        }).join('') + '</div>';
      } else {
        inner = '<textarea data-text="' + q.id + '" rows="3" placeholder="Type your answer…"></textarea>';
      }
      return '<div class="q"><div class="qlabel">' + esc(q.label) + '</div>' + (q.help ? '<div class="qhelp">' + esc(q.help) + '</div>' : '') + inner + '</div>';
    }).join('');

    box.innerHTML = '<div class="fb-card">' +
      '<h1>' + esc(data.title) + '</h1>' +
      '<p class="muted">' + esc(data.intro || '') + '</p>' +
      (data.anonymous ? '<div class="anon-note">🔒 This is anonymous — your name is not recorded. Be honest, it helps.</div>'
        : '<div class="field"><label>Your name</label><input id="byName" placeholder="So they know it\'s from you"></div>') +
      qs +
      '<div id="fbErr"></div>' +
      '<button class="btn btn-primary btn-block btn-lg" id="fbSubmit">Send my feedback →</button>' +
      '</div>';

    box.querySelectorAll('[data-scale] button').forEach(function (b) {
      b.onclick = function () {
        var qid = b.getAttribute('data-q');
        answers[qid] = b.getAttribute('data-v');
        b.parentNode.querySelectorAll('button').forEach(function (x) { x.classList.remove('sel'); });
        b.classList.add('sel');
      };
    });
    box.querySelectorAll('[data-choice] input').forEach(function (inp) {
      inp.onchange = function () {
        answers[inp.name] = inp.value;
        inp.closest('[data-choice]').querySelectorAll('label').forEach(function (l) { l.classList.remove('sel'); });
        inp.closest('label').classList.add('sel');
      };
    });
    box.querySelectorAll('[data-text]').forEach(function (t) { t.oninput = function () { answers[t.getAttribute('data-text')] = t.value; }; });

    document.getElementById('fbSubmit').onclick = submit;
  }

  function submit() {
    var btn = document.getElementById('fbSubmit');
    var by = document.getElementById('byName');
    btn.disabled = true; btn.textContent = 'Sending…';
    fetch('/api/public/feedback/' + token, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ answers: answers, submitted_by: by ? by.value : null })
    }).then(function (r) { return r.json().then(function (j) { return { ok: r.ok, j: j }; }); })
      .then(function (res) {
        if (!res.ok) { document.getElementById('fbErr').innerHTML = '<div class="error-msg">' + esc(res.j.error || 'Could not send') + '</div>'; btn.disabled = false; btn.textContent = 'Send my feedback →'; return; }
        box.innerHTML = '<div class="fb-card"><div class="fb-done"><div class="big">🙌</div><h1>Thanks, that\'s sent.</h1><p class="muted">Your feedback has gone through' + (data.anonymous ? ' anonymously' : '') + '. Cheers for taking the time — it genuinely helps.</p></div></div>';
      });
  }
})();
</script>
</body>
</html>
