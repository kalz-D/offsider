<!DOCTYPE html>
<html lang="en-AU">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Reference · Offsider</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@600;700;800;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/styles.css">
<style>
  body { background: var(--brand); }
  .fb-wrap { max-width: 580px; margin: 0 auto; padding: 1.4rem 1rem 4rem; }
  .fb-top { display: flex; align-items: center; gap: .5rem; color: #fff; padding: 1rem .2rem 1.6rem; }
  .fb-card { background: var(--surface); border-radius: var(--r-xl); box-shadow: var(--shadow-lg); padding: 1.7rem 1.5rem; }
  .fb-card h1 { font-size: 1.5rem; }
  .q { margin: 1.3rem 0; }
  .q .qlabel { font-family: var(--font-head); font-weight: 700; font-size: 1rem; margin-bottom: .15rem; }
  .q .qcat { font-size: .72rem; text-transform: uppercase; letter-spacing: .04em; color: var(--brand); font-weight: 800; margin-bottom: .3rem; }
  .fb-done { text-align: center; padding: 2rem 1rem; }
  .fb-done .big { font-size: 3rem; }
  .fb-foot { text-align: center; color: #bcd2e0; font-size: .82rem; margin-top: 1.4rem; }
  textarea { width: 100%; }
</style>
</head>
<body>
<div class="fb-wrap">
  <div class="fb-top"><span class="logo-mark"><svg viewBox="0 0 24 24"><path d="M12 2 L16.5 12.5 L12 10.2 L7.5 12.5 Z" fill="#fff"/><path d="M12 22 L7.5 11.5 L12 13.8 L16.5 11.5 Z" fill="#fff" opacity=".4"/></svg></span><strong style="font-family:var(--font-head);font-size:1.15rem">Offsider</strong></div>
  <div id="box"><div class="fb-card"><div class="loading-full" style="min-height:120px"><div class="spinner"></div></div></div></div>
  <div class="fb-foot">Confidential · Powered by Offsider</div>
</div>
<script>
(function () {
  var token = location.pathname.split('/').filter(Boolean).pop();
  var box = document.getElementById('box');
  var esc = function (s) { return String(s == null ? '' : s).replace(/[&<>"]/g, function (c) { return ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' })[c]; }); };
  var data = null, answers = {};
  function card(i) { return '<div class="fb-card">' + i + '</div>'; }

  fetch('/api/public/reference/' + token).then(function (r) { return r.json().then(function (j) { return { ok: r.ok, j: j }; }); })
    .then(function (res) {
      if (!res.ok) { box.innerHTML = card('<div class="fb-done"><div class="big">🤷</div><h1>' + esc(res.j.error || 'Link not found') + '</h1></div>'); return; }
      data = res.j;
      if (data.submitted) { box.innerHTML = card('<div class="fb-done"><div class="big">✅</div><h1>Thanks!</h1><p class="muted">Your reference has already been received. Much appreciated.</p></div>'); return; }
      render();
    });

  function render() {
    var qs = data.questions.map(function (q) {
      return '<div class="q"><div class="qcat">' + esc(q.category) + '</div><div class="qlabel">' + esc(q.question) + '</div><textarea data-q="' + q.id + '" rows="2" placeholder="Your answer…"></textarea></div>';
    }).join('');
    box.innerHTML = card(
      '<h1>Reference for ' + esc(data.candidateName) + '</h1>' +
      '<p class="muted">' + esc(data.candidateName) + ' has applied for ' + esc(data.roleApplied || 'a role') + ' at ' + esc(data.businessName) + ' and listed you as a referee. Your honest answers stay confidential — thanks for taking a few minutes.</p>' +
      qs +
      '<div id="err"></div>' +
      '<button class="btn btn-primary btn-block btn-lg" id="submit">Send reference →</button>');
    box.querySelectorAll('[data-q]').forEach(function (t) { t.oninput = function () { answers[t.getAttribute('data-q')] = t.value; }; });
    document.getElementById('submit').onclick = submit;
  }
  function submit() {
    var btn = document.getElementById('submit');
    btn.disabled = true; btn.textContent = 'Sending…';
    fetch('/api/public/reference/' + token, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ answers: answers }) })
      .then(function (r) { return r.json().then(function (j) { return { ok: r.ok, j: j }; }); })
      .then(function (res) {
        if (!res.ok) { document.getElementById('err').innerHTML = '<div class="error-msg">' + esc(res.j.error || 'Could not send') + '</div>'; btn.disabled = false; btn.textContent = 'Send reference →'; return; }
        box.innerHTML = card('<div class="fb-done"><div class="big">🙏</div><h1>Thank you!</h1><p class="muted">Your reference has gone through to ' + esc(data.businessName) + '. It really helps them make a fair decision.</p></div>');
      });
  }
})();
</script>
</body>
</html>
